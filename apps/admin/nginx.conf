# Admin panel uchun CSP (analitika yo'q; fonts + iconify + o'z API'si).
map $sent_http_content_type $csp_header_admin {
  default "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self'; connect-src 'self' https://api.iconify.design;";
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Content-Security-Policy $csp_header_admin always;

  # index.html keshlanmasin — har doim eng yangi build.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy $csp_header_admin always;
    try_files $uri =404;
  }

  # Hash'langan statik fayllar — uzoq kesh (immutable).
  location ~* \.(js|css|svg|webp|png|jpg|jpeg|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, immutable" always;
    add_header X-Content-Type-Options "nosniff" always;
  }

  # SPA fallback — kesh yo'q.
  location / {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy $csp_header_admin always;
    try_files $uri $uri/ /index.html;
  }
}
