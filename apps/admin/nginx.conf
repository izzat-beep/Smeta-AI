server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # index.html keshlanmasin — har doim eng yangi build.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri =404;
  }

  # Hash'langan statik fayllar — uzoq kesh (immutable).
  location ~* \.(js|css|svg|webp|png|jpg|jpeg|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  # SPA fallback — kesh yo'q.
  location / {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri $uri/ /index.html;
  }
}
