# Xavfsizlik sarlavhalari — barcha javoblarga qo'llanadi.
# (nginx'da server-darajadagi add_header location ichida add_header bo'lsa
#  meros o'tmaydi, shuning uchun har bir location'da qayta e'lon qilamiz —
#  buni bitta map/snippet bilan qisqartirib bo'lmagani uchun takrorlanadi.)
map $sent_http_content_type $csp_header {
  default "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; connect-src 'self' https://api.iconify.design https://www.google-analytics.com https://*.google-analytics.com https://*.googletagmanager.com;";
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Xavfsizlik sarlavhalari (barcha javoblar uchun).
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), geolocation=(), microphone=(self)" always;
  add_header Content-Security-Policy $csp_header always;

  # index.html HECH QACHON keshlanmasin — har doim eng yangi build'ga (yangi
  # hash'langan JS/CSS fayllariga) ishora qilsin. Aks holda deploy'dan keyin
  # brauzer eski index.html'ni ko'rsatib, "ma'lumotlar yo'qoldi" effekti beradi.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=(self)" always;
    add_header Content-Security-Policy $csp_header always;
    try_files $uri =404;
  }

  # Hash'langan statik fayllar (Vite ularga unikal nom beradi) — uzoq kesh.
  location ~* \.(js|css|svg|webp|png|jpg|jpeg|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, immutable" always;
    add_header X-Content-Type-Options "nosniff" always;
  }

  # SPA — qolgan barcha yo'llar index.html ga (kesh yo'q).
  location / {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=(self)" always;
    add_header Content-Security-Policy $csp_header always;
    try_files $uri $uri/ /index.html;
  }
}
