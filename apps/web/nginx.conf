server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # index.html HECH QACHON keshlanmasin — har doim eng yangi build'ga (yangi
  # hash'langan JS/CSS fayllariga) ishora qilsin. Aks holda deploy'dan keyin
  # brauzer eski index.html'ni ko'rsatib, "ma'lumotlar yo'qoldi" effekti beradi.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri =404;
  }

  # Hash'langan statik fayllar (Vite ularga unikal nom beradi) — uzoq kesh.
  location ~* \.(js|css|svg|webp|png|jpg|jpeg|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  # SPA — qolgan barcha yo'llar index.html ga (kesh yo'q).
  location / {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri $uri/ /index.html;
  }
}
