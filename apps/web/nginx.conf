server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA — barcha yo'llar index.html ga
  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(js|css|svg|webp|png|jpg|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }
}
