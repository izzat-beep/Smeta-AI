version: 2
updates:
  # NPM dependency'lar (monorepo ildizi — barcha workspace'larni qamrab oladi).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Kichik (patch/minor) yangilanishlarni bitta PR'ga birlashtiramiz.
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions'ning o'zini ham yangilab boramiz.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
